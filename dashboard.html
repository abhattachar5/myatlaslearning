<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyMate — Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<a href="#main-content" class="skip-link">Skip to main content</a>

<!-- ── Mobile Header ─────────────────────────────────────────────────────── -->
<header class="mobile-header">
  <div class="mobile-header-brand">
    <div class="sidebar-logo-mark" aria-hidden="true">S</div>
    <span class="sidebar-logo-text">Study<span>Mate</span></span>
  </div>
  <div class="mobile-header-actions">
    <button class="theme-toggle" id="theme-btn-mobile" onclick="handleThemeToggle()" aria-label="Switch to dark mode">🌙</button>
    <button class="hamburger-btn" id="hamburger-btn"
      aria-controls="sidebar" aria-expanded="false" aria-label="Open navigation menu"
      onclick="toggleSidebar()">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()" aria-hidden="true"></div>

<!-- ── Profile Modal ──────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="profile-modal" onclick="closeProfileModal(event)">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="profile-modal-title">
    <div class="modal-header">
      <h3 id="profile-modal-title">My Profile</h3>
      <button class="modal-close" onclick="closeProfileModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Name</label>
      <input class="form-input" id="edit-name" type="text">
    </div>
    <div class="form-group">
      <label class="form-label">Year group</label>
      <select class="form-input form-select" id="edit-year">
        <option value="Year 7">Year 7</option>
        <option value="Year 8">Year 8</option>
        <option value="Year 9">Year 9</option>
        <option value="Year 10">Year 10</option>
        <option value="Year 11">Year 11</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">School</label>
      <input class="form-input" id="edit-school" type="text">
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-primary" style="flex:1" onclick="saveProfile()">Save changes</button>
      <button class="btn btn-secondary" onclick="confirmReset()">Reset progress</button>
    </div>
    <div class="divider"></div>
    <button class="btn btn-secondary" style="width:100%" onclick="logout()">Sign out</button>
  </div>
</div>

<div class="app-layout">

  <!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar" aria-label="Main navigation">
    <div class="sidebar-logo">
      <div class="sidebar-logo-mark">S</div>
      <span class="sidebar-logo-text">Study<span>Mate</span></span>
    </div>

    <nav class="sidebar-nav">
      <p class="section-heading" style="padding:0 12px;margin-bottom:8px" id="nav-heading">Navigation</p>
      <button class="nav-item active" aria-current="page" onclick="closeSidebar()">
        <span class="nav-icon" aria-hidden="true">🏠</span> Dashboard
      </button>
      <button class="nav-item" onclick="openProfileModal()">
        <span class="nav-icon" aria-hidden="true">👤</span> My Profile
      </button>
    </nav>

    <div class="sidebar-user">
      <div class="user-card">
        <div class="user-name" id="sidebar-name">—</div>
        <div class="user-level" id="sidebar-level">Level 1 · Beginner</div>
        <div class="xp-bar-wrap">
          <div class="xp-bar-track" id="sidebar-xp-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="XP level progress">
            <div class="xp-bar-fill" id="sidebar-xp-fill" style="width:0%"></div>
          </div>
          <div class="xp-label">
            <span id="sidebar-xp">0 XP</span>
            <span id="sidebar-xp-next">100 XP</span>
          </div>
        </div>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="streak-badge" id="streak-display" role="status" aria-label="0 day streak"><span aria-hidden="true">🔥</span> 0 day streak</div>
      <button class="theme-toggle" id="theme-btn" onclick="handleThemeToggle()" aria-label="Switch to dark mode" title="Toggle theme">🌙</button>
    </div>
  </aside>

  <!-- ── Main ─────────────────────────────────────────────────────────────── -->
  <main class="main-content" id="main-content">

    <div class="page-header">
      <h1 id="welcome-msg">Good morning! 👋</h1>
      <p id="welcome-sub">Pick an island to continue your studies.</p>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value text-blue" id="stat-started">0</div>
        <div class="stat-label">Topics started</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:#22c55e" id="stat-mastered">0</div>
        <div class="stat-label">Topics mastered</div>
      </div>
      <div class="stat-card">
        <div class="stat-value text-amber" id="stat-xp">0</div>
        <div class="stat-label">Total XP</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:#f97316" id="stat-streak">0</div>
        <div class="stat-label">Day streak 🔥</div>
      </div>
    </div>

    <!-- Subject filters -->
    <div class="filter-row" id="filter-row">
      <button class="filter-btn" data-filter="math" onclick="setFilter('math')"
        style="--fc:#3f6f00">
        🔢 Maths <span class="filter-count">5</span>
      </button>
      <button class="filter-btn" data-filter="english" onclick="setFilter('english')"
        style="--fc:#ba7517">
        📖 English <span class="filter-count">5</span>
      </button>
      <button class="filter-btn" data-filter="science" onclick="setFilter('science')"
        style="--fc:#185fa5">
        🔬 Science <span class="filter-count">5</span>
      </button>
      <button class="filter-btn" data-filter="geography" onclick="setFilter('geography')"
        style="--fc:#0891b2">
        🗺️ Geography <span class="filter-count">4</span>
      </button>
      <button class="filter-btn" data-filter="history" onclick="setFilter('history')"
        style="--fc:#6d28d9">
        ⚔️ History <span class="filter-count">4</span>
      </button>
      <button class="filter-btn" data-filter="all" onclick="setFilter('all')"
        style="--fc:var(--text)">
        All <span class="filter-count">23</span>
      </button>
    </div>

    <!-- Island grid -->
    <div class="island-grid" id="island-grid"></div>

  </main>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
// ── Bootstrap ───────────────────────────────────────────────────────────────
let user = requireAuth();
let currentFilter = 'math';

(function init() {
  initTheme();
  updateThemeBtn();
  user = requireAuth();
  touchStreak();
  renderSidebar();
  renderStats();
  setFilter('math');
  setWelcome();
  initSidebar();
})();

// ── Welcome ──────────────────────────────────────────────────────────────────
function setWelcome() {
  const h = new Date().getHours();
  const greet = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('welcome-msg').textContent = `${greet}, ${user.name.split(' ')[0]}! 👋`;
  const stats = getGlobalStats();
  const pct = Math.round((stats.mastered / stats.total) * 100);
  document.getElementById('welcome-sub').textContent =
    stats.mastered === 0
      ? 'Pick an island below to start your GCSE journey.'
      : `You've mastered ${stats.mastered} of ${stats.total} topics (${pct}%). Keep going!`;
}

// ── Sidebar ──────────────────────────────────────────────────────────────────
function renderSidebar() {
  const xp = getTotalXP();
  const lvl = getUserLevel(xp);
  const pct = getLevelProgress(xp);
  const nextXP = lvl.maxXP === Infinity ? '∞' : lvl.maxXP + 1;
  document.getElementById('sidebar-name').textContent = user.name;
  document.getElementById('sidebar-level').textContent = `Level ${lvl.level} · ${lvl.title}`;
  document.getElementById('sidebar-xp').textContent = xp + ' XP';
  document.getElementById('sidebar-xp-next').textContent = nextXP + ' XP';
  const xpFill = document.getElementById('sidebar-xp-fill');
  xpFill.style.width = pct + '%';
  document.getElementById('sidebar-xp-bar').setAttribute('aria-valuenow', pct);
  const streak = getStreak();
  const streakEl = document.getElementById('streak-display');
  streakEl.innerHTML = `<span aria-hidden="true">🔥</span> ${streak} day${streak !== 1 ? 's' : ''}`;
  streakEl.setAttribute('aria-label', `${streak} day${streak !== 1 ? 's' : ''} streak`);
}

// ── Stats ────────────────────────────────────────────────────────────────────
function renderStats() {
  const stats = getGlobalStats();
  document.getElementById('stat-started').textContent = stats.started;
  document.getElementById('stat-mastered').textContent = stats.mastered;
  document.getElementById('stat-xp').textContent = stats.xp;
  document.getElementById('stat-streak').textContent = stats.streak;
}

// ── Filter ───────────────────────────────────────────────────────────────────
function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const isActive = btn.dataset.filter === filter;
    btn.classList.toggle('active', isActive);
    if (isActive) {
      const fc = btn.style.getPropertyValue('--fc') || 'var(--text)';
      btn.style.background = fc !== '' ? fc : 'var(--text)';
      btn.style.color = 'white';
      btn.style.borderColor = 'transparent';
    } else {
      btn.style.background = '';
      btn.style.color = '';
      btn.style.borderColor = '';
    }
  });
  renderGrid();
}

// ── Grid ─────────────────────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('island-grid');
  const allProgress = getAllProgress();
  const islands = currentFilter === 'all'
    ? CURRICULUM
    : CURRICULUM.filter(i => i.subjectId === currentFilter);

  if (islands.length === 0) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">🔍</div><p>No topics found.</p></div>';
    return;
  }

  grid.innerHTML = islands.map(island => {
    const unlocked = isIslandUnlocked(island, allProgress);
    const progress = calcIslandProgress(island.id);
    const statusIdx = getIslandStatus(island.id);
    const statusLabel = STATUS_LABELS[statusIdx];
    const statusColor = STATUS_COLORS[statusIdx];
    const cardCount = FLASHCARDS.filter(f => f.islandId === island.id).length;

    const cardAction = unlocked ? `goToIsland('${island.id}')` : `showLockedMsg('${island.id}')`;
    const cardLabel = unlocked
      ? `${island.name} — ${island.subject}, ${statusLabel}`
      : `${island.name} — locked, complete prerequisites first`;
    return `<div class="island-card${unlocked ? '' : ' locked'}"
        role="button"
        tabindex="0"
        aria-label="${cardLabel}"
        ${!unlocked ? 'aria-disabled="true"' : ''}
        style="border-top-color:${island.color}"
        onclick="${cardAction}"
        onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();${cardAction}}">
      <div class="island-card-top">
        <div class="island-emoji" aria-hidden="true">${island.emoji}</div>
        ${createProgressRing(progress, island.color, 52)}
      </div>
      <div style="margin-bottom:6px" aria-hidden="true">
        <span class="subject-pill" style="background:${island.color}">${island.subject}</span>
      </div>
      <div class="island-name" aria-hidden="true">${island.name}</div>
      <div class="island-meta" aria-hidden="true">⏱ ${island.estimatedHours}h · ${cardCount} flashcards</div>
      <div class="status-chip" aria-hidden="true">
        <span class="status-dot" style="background:${statusColor}"></span>
        <span style="color:${statusColor}">${statusLabel}</span>
      </div>
      ${!unlocked ? '<div class="lock-overlay" style="background:rgba(var(--bg-rgb),.4)" aria-hidden="true">🔒</div>' : ''}
    </div>`;
  }).join('');
}

function goToIsland(id) {
  window.location.href = `island.html?id=${id}`;
}

function showLockedMsg(id) {
  const island = CURRICULUM.find(i => i.id === id);
  if (!island || !island.prerequisites.length) return;
  const prereqNames = island.prerequisites.map(pid => {
    const p = CURRICULUM.find(c => c.id === pid);
    return p ? p.name : pid;
  }).join(', ');
  showToast(`🔒 Complete ${prereqNames} first`, 'error');
}

// ── Profile Modal ─────────────────────────────────────────────────────────────
let _modalTrigger = null;
function openProfileModal() {
  closeSidebar();
  _modalTrigger = document.activeElement;
  document.getElementById('edit-name').value = user.name;
  document.getElementById('edit-year').value = user.year || 'Year 10';
  document.getElementById('edit-school').value = user.school || '';
  document.getElementById('profile-modal').classList.add('show');
  setTimeout(() => document.getElementById('edit-name').focus(), 50);
}
function closeProfileModal(e) {
  if (e && e.target !== document.getElementById('profile-modal')) return;
  document.getElementById('profile-modal').classList.remove('show');
  if (_modalTrigger) { _modalTrigger.focus(); _modalTrigger = null; }
}
function saveProfile() {
  const name   = document.getElementById('edit-name').value.trim();
  const year   = document.getElementById('edit-year').value;
  const school = document.getElementById('edit-school').value.trim();
  if (!name) return;
  // Update current profile
  user.name = name; user.year = year; user.school = school;
  setUser(user);
  // Update in profiles list
  const profiles = JSON.parse(localStorage.getItem('sm_profiles') || '[]');
  const idx = profiles.findIndex(p => p.joinDate === user.joinDate);
  if (idx !== -1) { profiles[idx] = user; localStorage.setItem('sm_profiles', JSON.stringify(profiles)); }
  document.getElementById('profile-modal').classList.remove('show');
  renderSidebar();
  setWelcome();
  showToast('Profile updated', 'success');
}
function confirmReset() {
  if (!confirm('Reset ALL your progress? This cannot be undone.')) return;
  saveAllProgress({});
  user.xp = 0;
  setUser(user);
  document.getElementById('profile-modal').classList.remove('show');
  renderSidebar();
  renderStats();
  renderGrid();
  setWelcome();
  showToast('Progress reset', 'success');
}

// ── Sidebar (mobile drawer) ───────────────────────────────────────────────────
function isMobile() { return window.matchMedia('(max-width: 900px)').matches; }
function initSidebar() {
  if (isMobile()) document.getElementById('sidebar').setAttribute('inert', '');
}
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const btn = document.getElementById('hamburger-btn');
  const isOpen = sidebar.classList.toggle('open');
  overlay.classList.toggle('show', isOpen);
  btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  btn.setAttribute('aria-label', isOpen ? 'Close navigation menu' : 'Open navigation menu');
  if (isOpen) {
    sidebar.removeAttribute('inert');
    const first = sidebar.querySelector('button, a, [tabindex]:not([tabindex="-1"])');
    if (first) first.focus();
  } else {
    sidebar.setAttribute('inert', '');
    btn.focus();
  }
}
function closeSidebar() {
  const sidebar = document.getElementById('sidebar');
  if (!sidebar) return;
  sidebar.classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
  const btn = document.getElementById('hamburger-btn');
  if (btn) {
    btn.setAttribute('aria-expanded', 'false');
    btn.setAttribute('aria-label', 'Open navigation menu');
  }
  if (isMobile()) sidebar.setAttribute('inert', '');
}
window.addEventListener('resize', () => {
  const sidebar = document.getElementById('sidebar');
  if (!sidebar) return;
  if (!isMobile()) {
    sidebar.removeAttribute('inert');
    sidebar.classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('show');
    const btn = document.getElementById('hamburger-btn');
    if (btn) btn.setAttribute('aria-expanded', 'false');
  } else if (!sidebar.classList.contains('open')) {
    sidebar.setAttribute('inert', '');
  }
});

// ── Theme ────────────────────────────────────────────────────────────────────
function handleThemeToggle() {
  toggleTheme();
  updateThemeBtn();
}
function updateThemeBtn() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  const icon = dark ? '☀️' : '🌙';
  const label = dark ? 'Switch to light mode' : 'Switch to dark mode';
  ['theme-btn', 'theme-btn-mobile'].forEach(id => {
    const btn = document.getElementById(id);
    if (btn) { btn.textContent = icon; btn.setAttribute('aria-label', label); }
  });
}

// ── Keyboard ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const modal = document.getElementById('profile-modal');
  const modalOpen = modal.classList.contains('show');
  const sidebar = document.getElementById('sidebar');
  const sidebarOpen = sidebar.classList.contains('open');
  if (e.key === 'Escape') {
    if (modalOpen) { closeProfileModal(); return; }
    if (sidebarOpen) { closeSidebar(); return; }
  }
  // Focus trap inside modal
  if (modalOpen && e.key === 'Tab') {
    const focusable = [...modal.querySelectorAll('button, input, select, [tabindex]:not([tabindex="-1"])')
      ].filter(el => !el.closest('[inert]'));
    const first = focusable[0];
    const last = focusable[focusable.length - 1];
    if (e.shiftKey) {
      if (document.activeElement === first) { e.preventDefault(); last.focus(); }
    } else {
      if (document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
  }
});
</script>
</body>
</html>
