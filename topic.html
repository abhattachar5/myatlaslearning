<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlas — Topic</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/gotrue-js@1.0.1/browser/gotrue.js"></script>
</head>
<body>

<a class="skip-link" href="#topic-main">Skip to content</a>

<!-- ── Topic Header ───────────────────────────────────────────────────────── -->
<header class="island-header" id="topic-header" style="background:var(--surface)">
  <a href="dashboard.html" class="island-header-back" aria-label="Back to dashboard">←</a>
  <div class="island-header-emoji" id="hdr-emoji">—</div>
  <div class="island-header-info">
    <h2 id="hdr-name">Loading…</h2>
    <div class="island-header-meta">
      <span class="subject-pill" id="hdr-subject" style="font-size:.6875rem;padding:2px 8px">Mathematics</span>
      <span class="badge" id="hdr-count">—</span>
      <span class="badge" id="hdr-progress">—</span>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <button class="theme-toggle" onclick="openProfileModal()" aria-label="My Profile">👤</button>
    <button class="theme-toggle" onclick="handleThemeToggle()" id="theme-btn" aria-label="Toggle colour theme">🌙</button>
  </div>
</header>

<!-- ── Main ──────────────────────────────────────────────────────────────── -->
<main class="page-main topic-main" id="topic-main">

  <!-- Topic description -->
  <div id="topic-desc-wrap" style="margin-bottom:24px;display:none">
    <div class="overview-box">
      <p id="topic-desc" style="margin:0;font-size:.9375rem;color:var(--text-2)"></p>
    </div>
  </div>

  <!-- Progress bar -->
  <div id="topic-progress-wrap" style="margin-bottom:28px;display:none">
    <div class="topic-progress-header">
      <span style="font-size:.8125rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted)">Topic progress</span>
      <span id="topic-progress-label" style="font-size:.875rem;font-weight:700;color:var(--text)">0 / 0 topics mastered</span>
    </div>
    <div style="height:8px;background:var(--ring-track);border-radius:4px;overflow:hidden">
      <div id="topic-progress-bar" style="height:100%;background:#3b82f6;border-radius:4px;transition:width .4s ease;width:0%"></div>
    </div>
  </div>

  <!-- Island grid -->
  <div class="island-grid" id="island-grid"></div>

  <!-- Topic Test CTA (below cards) -->
  <div id="topic-test-cta" style="margin-top:32px;display:none">
    <div id="test-cta-box" style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <div style="font-weight:700;margin-bottom:2px">📝 Topic Test</div>
        <div style="font-size:.875rem;color:var(--text-muted)" id="test-cta-desc">Test yourself across all subtopics — fresh questions every time.</div>
      </div>
      <button class="btn btn-primary" id="test-cta-btn" onclick="goToTest()">Take Test →</button>
    </div>
  </div>

  <!-- Writing Challenge CTA (only for Writing Strategies) -->
  <div id="writing-challenge-cta" style="margin-top:16px;display:none">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;border-left:4px solid #f59e0b">
      <div>
        <div style="font-weight:700;margin-bottom:2px">✍️ Writing Challenge</div>
        <div style="font-size:.875rem;color:var(--text-muted)">Write a full response to a prompt and get instant feedback on your work.</div>
      </div>
      <button class="btn btn-primary" style="background:#f59e0b;border-color:#f59e0b" onclick="goToWritingTest()">Start Writing Challenge →</button>
    </div>
  </div>

</main>

<script>
// ── Init ──────────────────────────────────────────────────────────────────
let user = requireAuth();
const params = new URLSearchParams(location.search);
const topicId = params.get('id');
let topic = (typeof MATH_TOPICS !== 'undefined' ? MATH_TOPICS.find(t => t.id === topicId) : null)
         || (typeof MATH_TOPICS_Y8 !== 'undefined' ? MATH_TOPICS_Y8.find(t => t.id === topicId) : null)
         || (typeof ENGLISH_TOPICS !== 'undefined' ? ENGLISH_TOPICS.find(t => t.id === topicId) : null)
         || (typeof ENGLISH_TOPICS_Y8 !== 'undefined' ? ENGLISH_TOPICS_Y8.find(t => t.id === topicId) : null)
         || (typeof SCIENCE_Y7_TOPICS !== 'undefined' ? SCIENCE_Y7_TOPICS.find(t => t.id === topicId) : null)
         || (typeof SCIENCE_TOPICS_Y8 !== 'undefined' ? SCIENCE_TOPICS_Y8.find(t => t.id === topicId) : null)
         || (typeof HISTORY_TOPICS !== 'undefined' ? HISTORY_TOPICS.find(t => t.id === topicId) : null)
         || (typeof HISTORY_TOPICS_Y8 !== 'undefined' ? HISTORY_TOPICS_Y8.find(t => t.id === topicId) : null)
         || (typeof GEOGRAPHY_TOPICS !== 'undefined' ? GEOGRAPHY_TOPICS.find(t => t.id === topicId) : null)
         || (typeof GEOGRAPHY_TOPICS_Y8 !== 'undefined' ? GEOGRAPHY_TOPICS_Y8.find(t => t.id === topicId) : null);
const isEnglishTopic = topic && topic.id && (topic.id.startsWith('et-') || topic.id.startsWith('e8t-'));
const isScienceTopic = topic && topic.id && (topic.id.startsWith('st7-') || topic.id.startsWith('s8t-'));
const isHistoryTopic = topic && topic.id && (topic.id.startsWith('ht-') || topic.id.startsWith('h8t-'));
const isGeographyTopic = topic && topic.id && (topic.id.startsWith('gt-') || topic.id.startsWith('g8t-'));
const topicColor = isEnglishTopic ? '#f59e0b' : isScienceTopic ? '#6366f1' : isHistoryTopic ? '#a855f7' : isGeographyTopic ? '#0d9488' : '#3b82f6';
const topicSubject = isEnglishTopic ? 'English' : isScienceTopic ? 'Science' : isHistoryTopic ? 'History' : isGeographyTopic ? 'Geography' : 'Mathematics';
const subjectId = isEnglishTopic ? 'english' : isScienceTopic ? 'science' : isHistoryTopic ? 'history' : isGeographyTopic ? 'geography' : 'math';
const dashboardUrl = 'dashboard.html?subject=' + subjectId;

if (!topic) {
  alert('Topic not found');
  window.location.href = dashboardUrl;
}

// Comprehension has its own dedicated page (Year 7: et-04, Year 8: e8t-04)
if (topicId === 'et-04' || topicId === 'e8t-04') {
  window.location.href = 'comprehension.html';
}

// Islands belonging to this topic
const topicIslands = CURRICULUM.filter(i => i.topicId === topicId);

(function init() {
  initTheme();
  updateThemeBtn();
  document.title = `Atlas — ${topic.name}`;
  document.querySelector('.island-header-back').href = dashboardUrl;
  var dashBtn = document.getElementById('mobile-dash-btn');
  if (dashBtn) dashBtn.onclick = function() { window.location.href = dashboardUrl; };
  renderHeader();
  renderProgress();
  renderGrid();
  touchStreak();
})();

// ── Theme ─────────────────────────────────────────────────────────────────
function handleThemeToggle() { toggleTheme(); updateThemeBtn(); }
function updateThemeBtn() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  const btn = document.getElementById('theme-btn');
  btn.textContent = dark ? '☀️' : '🌙';
  btn.setAttribute('aria-label', dark ? 'Switch to light mode' : 'Switch to dark mode');
  btn.setAttribute('aria-pressed', dark ? 'true' : 'false');
}

// ── Header ────────────────────────────────────────────────────────────────
function renderHeader() {
  document.getElementById('hdr-emoji').textContent = topic.emoji;
  document.getElementById('hdr-name').textContent = topic.name;
  const subPill = document.getElementById('hdr-subject');
  subPill.style.background = topicColor;
  subPill.style.color = 'white';
  subPill.textContent = topicSubject;
  document.getElementById('hdr-count').textContent = `${topicIslands.length} ${topicIslands.length === 1 ? 'topic' : 'topics'}`;
}

// ── Progress ──────────────────────────────────────────────────────────────
function renderProgress() {
  if (topicIslands.length === 0) return;

  let mastered = 0, started = 0;
  topicIslands.forEach(island => {
    const s = getIslandStatus(island.id);
    if (s > 0) started++;
    if (s === 4) mastered++;
  });

  const pct = Math.round((mastered / topicIslands.length) * 100);
  document.getElementById('hdr-progress').textContent = `${mastered} / ${topicIslands.length} mastered`;

  const wrap = document.getElementById('topic-progress-wrap');
  wrap.style.display = '';
  document.getElementById('topic-progress-label').textContent = `${mastered} / ${topicIslands.length} topics mastered`;
  document.getElementById('topic-progress-bar').style.width = pct + '%';
  document.getElementById('topic-progress-bar').style.background = topicColor;

  if (topic.description) {
    document.getElementById('topic-desc').textContent = topic.description;
    document.getElementById('topic-desc-wrap').style.display = '';
  }
}

// ── Grid ──────────────────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('island-grid');
  const allProgress = getAllProgress();

  if (topicIslands.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-state-icon">🚧</div>
      <p>Topics for this topic are coming soon!</p>
    </div>`;
    return;
  }

  grid.innerHTML = topicIslands.map(island => {
    const unlocked = isIslandUnlocked(island, allProgress);
    const progress = calcIslandProgress(island.id);
    const statusIdx = getIslandStatus(island.id);
    const statusLabel = STATUS_LABELS[statusIdx];
    const statusColor = STATUS_COLORS[statusIdx];
    const cardCount = FLASHCARDS.filter(f => f.islandId === island.id).length;
    const qCount = (QUESTIONS[island.id] || []).length;

    return `<div class="island-card${unlocked ? '' : ' locked'}"
        style="border-top-color:${island.color || topicColor}"
        onclick="${unlocked ? `goToIsland('${island.id}')` : `showLockedMsg('${island.id}')`}"
        role="link" tabindex="0"
        aria-label="${island.name}, ${statusLabel}"
        onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();${unlocked ? `goToIsland('${island.id}')` : `showLockedMsg('${island.id}')`};}"
        title="${unlocked ? island.name : 'Complete prerequisites first'}">
      <div class="island-card-top">
        <div class="island-emoji">${island.emoji}</div>
        ${createProgressRing(progress, (island.color || topicColor), 52)}
      </div>
      <div style="margin-bottom:6px">
        <span class="subject-pill" style="background:${island.color || topicColor}">${island.difficulty === 1 ? 'Foundation' : island.difficulty === 2 ? 'Higher' : 'Challenge'}</span>
      </div>
      <div class="island-name">${island.name}</div>
      <div class="island-meta">⏱ ${island.estimatedHours}h · ${cardCount} cards · ${qCount} questions</div>
      <div class="status-chip">
        <span class="status-dot" style="background:${statusColor}"></span>
        <span style="color:${statusColor}">${statusLabel}</span>
      </div>
      ${!unlocked ? '<div class="lock-overlay" style="background:rgba(var(--bg-rgb),.4)">🔒</div>' : ''}
    </div>`;
  }).join('');
}

function goToIsland(id) {
  window.location.href = `island.html?id=${id}&from=topic&topicId=${topicId}`;
}

function goToTest() {
  if (document.getElementById('test-cta-btn').disabled) return;
  window.location.href = 'test.html?id=' + topicId;
}

function goToWritingTest() {
  window.location.href = 'writing-test.html?id=' + topicId;
}

// Show test CTA if topic has test generators; lock until all topics covered
(function showTestCTA() {
  var cta = document.getElementById('topic-test-cta');
  const testableTopics = ['mt-01','mt-02','mt-03','mt-04','mt-05','mt-06','mt-07','mt-08','mt-09','mt-10','mt-11','mt-12','mt-13','mt-14','mt-15','mt-16','mt-17','mt-18','mt-19','mt-20','mt-21','mt-22','mt-23','mt-24','mt-25','mt-26','mt-27','mt-28','et-01','et-02','et-03','et-05','et-06','et-07','et-08','st7-01','st7-02','st7-03','st7-04','st7-05','st7-06','st7-07','ht-01','ht-02','ht-03','ht-04','ht-05','ht-06','gt-01','gt-02','gt-03','gt-04','gt-05','gt-06'];
  // Show the Test CTA for any topic that has subtopics with questions. The fixed list
  // covers Year 7; the CURRICULUM check covers Year 8 (and any future year) where a
  // topic has islands. Comprehension topics (et-04 / e8t-04) are redirected above.
  var hasIslands = (typeof CURRICULUM !== 'undefined') && CURRICULUM.some(function (i) { return i.topicId === topicId; });
  if (testableTopics.indexOf(topicId) !== -1 || hasIslands) {
    cta.style.display = '';
    updateTestLock();
  }
  // Show Writing Challenge CTA for Writing Strategies (Y7) / Writing Craft (Y8)
  if (topicId === 'et-06' || topicId === 'e8t-06') {
    document.getElementById('writing-challenge-cta').style.display = '';
  }
})();

function updateTestLock() {
  // TEMP: lock check disabled for testing
  var btn = document.getElementById('test-cta-btn');
  var desc = document.getElementById('test-cta-desc');
  var box = document.getElementById('test-cta-box');
  btn.disabled = false;
  btn.style.opacity = '';
  btn.style.cursor = '';
  desc.textContent = 'Test yourself across all subtopics — fresh questions every time.';
  box.style.opacity = '';
}

function showLockedMsg(id) {
  const island = CURRICULUM.find(i => i.id === id);
  if (!island || !island.prerequisites.length) return;
  const prereqNames = island.prerequisites.map(pid => {
    const p = CURRICULUM.find(c => c.id === pid);
    return p ? p.name : pid;
  }).join(', ');
  showToast(`🔒 Complete ${prereqNames} first`, 'error');
}

// ── Keyboard ──────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') window.location.href = dashboardUrl;
});
</script>

<!-- ── Profile Modal ──────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="profile-modal" role="dialog" aria-modal="true" aria-labelledby="profile-modal-title" onclick="closeProfileModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="profile-modal-title">My Profile</h3>
      <button class="modal-close" onclick="closeProfileModal()" aria-label="Close profile modal">✕</button>

    <p style="margin:0 0 4px;font-size:.8125rem;color:var(--text-muted)">👤 Account: <span id="display-parent-name">—</span> · <span id="display-parent-email">—</span></p>
    <div class="divider" style="margin:8px 0 12px"></div>
    <div class="form-group">

<nav class="mobile-nav">

    Dashboard
  </button>
  <button class="mobile-nav-item" onclick="openProfileModal()">
    <span class="mobile-nav-icon">👤</span>
    Profile
  </button>
  <button class="mobile-nav-item" id="mobile-streak-btn">

    <span id="mobile-streak-label">0 days</span>

<script>
// ── Profile Modal Logic ───────────────────────────────────────────────────
let _modalTrigger = null;
function openProfileModal() {
  _modalTrigger = document.activeElement;
  const user = JSON.parse(localStorage.getItem('sm_active_profile') || '{}');
  var identity = getIdentityUser();
  document.getElementById('display-parent-name').textContent = user.parentName || (identity && identity.user_metadata ? identity.user_metadata.full_name : '') || '—';
  document.getElementById('display-parent-email').textContent = identity ? identity.email : '—';
  document.getElementById('edit-name').value = user.name || '';
  document.getElementById('edit-year').value = user.year || 'Year 7';
  document.getElementById('edit-school').value = user.school || '';
  document.getElementById('profile-modal').classList.add('show');
  setTimeout(() => document.getElementById('edit-name').focus(), 50);
}
function closeProfileModal(e) {
  if (e && e.target !== document.getElementById('profile-modal')) return;
  document.getElementById('profile-modal').classList.remove('show');
  if (_modalTrigger) { _modalTrigger.focus(); _modalTrigger = null; }
}
document.getElementById('profile-modal').addEventListener('keydown', function(e) {
  if (!this.classList.contains('show')) return;
  if (e.key !== 'Tab') return;
  const focusable = this.querySelector('.modal').querySelectorAll(
    'button:not([disabled]), input, select, [tabindex]:not([tabindex="-1"])'
  );
  const first = focusable[0];
  const last  = focusable[focusable.length - 1];
  if (e.shiftKey) {
    if (document.activeElement === first) { e.preventDefault(); last.focus(); }
  } else {
    if (document.activeElement === last)  { e.preventDefault(); first.focus(); }
  }
});
function saveProfile() {
  const name   = document.getElementById('edit-name').value.trim();
  const year   = document.getElementById('edit-year').value;
  const school = document.getElementById('edit-school').value.trim();
  if (!name) return;
  const user = JSON.parse(localStorage.getItem('sm_active_profile') || '{}');
  user.name = name; user.year = year; user.school = school;
  localStorage.setItem('sm_active_profile', JSON.stringify(user));
  syncProgressToServer();
  document.getElementById('profile-modal').classList.remove('show');
  showToast('Profile updated', 'success');
}
function logout() {
  localStorage.removeItem('gotrue.user');
  localStorage.removeItem('sm_active_profile');
  if (typeof netlifyIdentity !== 'undefined') {
    try { netlifyIdentity.logout(); } catch (e) { /* token already cleared */ }
  }
  window.location.href = 'index.html';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && document.getElementById('profile-modal').classList.contains('show')) {
    closeProfileModal();
  }
});

// ── Mobile streak display ─────────────────────────────────────────────────
(function() {
  const user = JSON.parse(localStorage.getItem('sm_active_profile') || '{}');
  const streak = parseInt(localStorage.getItem('sm_streak') || '0');
  const el = document.getElementById('mobile-streak-label');
  if (el) el.textContent = streak + ' day' + (streak !== 1 ? 's' : '');
})();

function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast toast--' + (type || 'info');
  t.setAttribute('role', 'status');
  t.setAttribute('aria-live', 'polite');
  t.setAttribute('aria-atomic', 'true');
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => t.classList.add('toast--show'));
  setTimeout(() => { t.classList.remove('toast--show'); setTimeout(() => t.remove(), 300); }, 2500);
}
</script>
