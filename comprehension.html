<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlas — Comprehension</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/gotrue-js@1.0.1/browser/gotrue.js"></script>
  <style>
    /* ── Comprehension-specific styles ──────────────────────────────────────── */

    .comp-stats-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .comp-stats-label {
      font-size: .875rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }
    .comp-stats-bar-track {
      flex: 1;
      height: 8px;
      background: var(--border);
      border: 1px solid #9ca3af;
      border-radius: 4px;
      overflow: hidden;
    }
    .comp-stats-bar-fill {
      height: 100%;
      background: #f59e0b;
      border-radius: 4px;
      transition: width .4s ease;
    }

    /* Filter bar */
    .comp-filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .comp-filter-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 99px;
      border: 1.5px solid var(--border);
      font-size: .8125rem;
      font-weight: 600;
      color: var(--text-2);
      background: var(--surface);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .comp-filter-btn:hover {
      border-color: var(--text-2);
      color: var(--text);
    }
    .comp-filter-btn.active {
      background: #f59e0b;
      color: white;
      border-color: transparent;
    }
    .comp-filter-count {
      background: rgba(255,255,255,.25);
      border-radius: 99px;
      padding: 0 6px;
      font-size: .6875rem;
      font-weight: 700;
    }

    /* Passage cards grid */
    .passage-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .passage-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      cursor: pointer;
      transition: box-shadow .2s, border-color .2s, transform .15s;
      position: relative;
    }
    .passage-card:hover {
      border-color: #f59e0b;
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
      transform: translateY(-2px);
    }
    .passage-card:focus-visible {
      outline: 2px solid #f59e0b;
      outline-offset: 2px;
    }
    .passage-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .passage-type-badge {
      display: inline-block;
      font-size: .6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      padding: 2px 8px;
      border-radius: 6px;
      white-space: nowrap;
    }
    .passage-type-badge.fiction {
      background: #e8d5f5;
      color: #7c3aed;
    }
    .passage-type-badge.nonfiction {
      background: #d1ecf1;
      color: #0c5460;
    }
    [data-theme="dark"] .passage-type-badge.fiction {
      background: #3b1f5e;
      color: #c4a5e0;
    }
    [data-theme="dark"] .passage-type-badge.nonfiction {
      background: #1a3a42;
      color: #7ec8d4;
    }
    .passage-complete-check {
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .passage-card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .passage-card-source {
      font-size: .8125rem;
      font-style: italic;
      color: var(--text-muted);
      margin-bottom: 10px;
      line-height: 1.35;
    }
    .passage-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .passage-q-badge {
      font-size: .75rem;
      font-weight: 600;
      color: var(--text-2);
      background: var(--bg);
      padding: 3px 10px;
      border-radius: 99px;
      border: 1px solid var(--border);
    }
    .passage-progress-text {
      font-size: .75rem;
      font-weight: 600;
      color: var(--text-muted);
    }
    .passage-progress-text.complete {
      color: #16a34a;
    }

    /* ── Expanded passage view ────────────────────────────────────────────── */
    .expanded-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--bg);
      overflow: hidden;
      flex-direction: column;
    }
    .expanded-overlay.show {
      display: flex;
    }
    .expanded-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }
    .expanded-close-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text);
      transition: background .15s;
      flex-shrink: 0;
    }
    .expanded-close-btn:hover {
      background: var(--border);
    }
    .expanded-title-area {
      flex: 1;
      min-width: 0;
    }
    .expanded-title {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .expanded-meta {
      font-size: .8125rem;
      font-style: italic;
      color: var(--text-muted);
    }
    .expanded-body {
      display: flex;
      gap: 0;
      flex: 1;
      min-height: 0;          /* allow flex children to shrink below content size */
    }
    .expanded-passage-col {
      width: 60%;
      padding: 28px 32px;
      overflow-y: auto;
      border-right: 1px solid var(--border);
      height: 100%;           /* fill available height, scroll independently */
    }
    .expanded-questions-col {
      width: 40%;
      padding: 28px 24px;
      overflow-y: auto;
      height: 100%;           /* fill available height, scroll independently */
    }
    .passage-text {
      font-size: .9375rem;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-line;
    }
    .passage-text p {
      margin-bottom: 16px;
    }

    /* Questions */
    .comp-question-block {
      margin-bottom: 28px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .comp-question-block:last-child {
      border-bottom: none;
      margin-bottom: 0;
    }
    .comp-skill-badge {
      display: inline-block;
      font-size: .6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      padding: 2px 8px;
      border-radius: 6px;
      background: rgba(186, 117, 23, .12);
      color: #f59e0b;
      margin-bottom: 8px;
    }
    .comp-question-text {
      font-size: .9375rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
      line-height: 1.45;
    }
    .comp-option-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 14px;
      margin-bottom: 6px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      font-size: .875rem;
      color: var(--text);
      cursor: pointer;
      transition: border-color .15s, background .15s;
      line-height: 1.4;
    }
    .comp-option-btn:hover:not(.answered):not(.locked) {
      border-color: #f59e0b;
      background: rgba(186, 117, 23, .05);
    }
    .comp-option-btn:focus-visible {
      outline: 2px solid #f59e0b;
      outline-offset: 2px;
    }
    .comp-option-btn.selected {
      border-color: #f59e0b;
      background: rgba(186, 117, 23, .12);
      font-weight: 600;
    }
    .comp-option-btn.answered, .comp-option-btn.locked {
      cursor: default;
    }
    .comp-option-btn.correct {
      border-color: #16a34a;
      background: rgba(22, 163, 74, .1);
      color: #15803d;
    }
    .comp-option-btn.wrong {
      border-color: #dc2626;
      background: rgba(220, 38, 38, .08);
      color: #b91c1c;
    }
    .comp-explanation {
      display: none;
      margin-top: 10px;
      padding: 10px 14px;
      background: rgba(186, 117, 23, .06);
      border-left: 3px solid #f59e0b;
      border-radius: 0 8px 8px 0;
      font-size: .8125rem;
      line-height: 1.55;
      color: var(--text-2);
    }
    .comp-explanation.show {
      display: block;
    }
    .comp-question-status {
      display: inline-block;
      margin-left: 8px;
      font-size: .8125rem;
      font-weight: 700;
    }
    .comp-question-status.right {
      color: #16a34a;
    }
    .comp-question-status.incorrect {
      color: #dc2626;
    }

    /* Submit button */
    .comp-submit-btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      margin-top: 24px;
      border: none;
      border-radius: 12px;
      background: #f59e0b;
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    .comp-submit-btn:hover {
      background: #a5670f;
    }
    .comp-submit-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    /* Score screen */
    .comp-score-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      min-height: 100%;
    }
    .comp-score-ring {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 8px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      position: relative;
    }
    .comp-score-ring.perfect {
      border-color: #16a34a;
    }
    .comp-score-ring.good {
      border-color: #f59e0b;
    }
    .comp-score-ring.needs-work {
      border-color: #dc2626;
    }
    .comp-score-number {
      font-size: 2.25rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
    }
    .comp-score-total {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-muted);
    }
    .comp-score-label {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }
    .comp-score-sublabel {
      font-size: .9rem;
      color: var(--text-muted);
      margin-bottom: 28px;
    }
    .comp-score-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .comp-score-actions button {
      padding: 12px 28px;
      border-radius: 10px;
      font-size: .9375rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
      border: none;
    }
    .comp-btn-review {
      background: var(--surface);
      border: 1.5px solid var(--border) !important;
      color: var(--text);
    }
    .comp-btn-review:hover {
      background: var(--border);
    }
    .comp-btn-retake {
      background: #f59e0b;
      color: white;
    }
    .comp-btn-retake:hover {
      background: #a5670f;
    }
    .comp-btn-close {
      background: var(--bg);
      border: 1.5px solid var(--border) !important;
      color: var(--text-2);
    }
    .comp-btn-close:hover {
      background: var(--border);
    }

    /* Score badge on passage cards */
    .passage-score-badge {
      font-size: .75rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 99px;
      white-space: nowrap;
    }
    .passage-score-badge.perfect {
      background: rgba(22, 163, 74, .12);
      color: #15803d;
    }
    .passage-score-badge.good {
      background: rgba(186, 117, 23, .12);
      color: #f59e0b;
    }
    .passage-score-badge.needs-work {
      background: rgba(220, 38, 38, .1);
      color: #dc2626;
    }

    /* ── Responsive ───────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .expanded-body {
        flex-direction: column;
      }
      .expanded-passage-col {
        width: 100%;
        min-height: 40%;
        height: auto;
        flex: 1 1 auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 20px 16px;
      }
      .expanded-questions-col {
        width: 100%;
        min-height: 40%;
        height: auto;
        flex: 1 1 auto;
        padding: 20px 16px;
      }
      .passage-grid {
        grid-template-columns: 1fr;
      }
      .comp-stats-bar {
        flex-wrap: wrap;
        gap: 10px;
      }
    }
  </style>
<style>
  /* Year 8 written (GCSE) comprehension mode */
  .comp-marks-badge { display:inline-block; float:right; font-size:.75rem; font-weight:700; color:#fff; background:#f59e0b; border-radius:10px; padding:2px 10px; }
  .comp-written-area { width:100%; box-sizing:border-box; margin-top:10px; padding:12px; border:2px solid var(--border); border-radius:8px; font-family:inherit; font-size:.9375rem; line-height:1.6; resize:vertical; background:var(--surface); color:var(--text); }
  .comp-written-area:focus { outline:none; border-color:#f59e0b; }
  .comp-your-answer { white-space:pre-wrap; background:var(--bg, #f8fafc); border:1px solid var(--border); border-radius:8px; padding:12px; margin:10px 0; font-size:.875rem; line-height:1.6; color:var(--text-2, var(--text)); }
  .comp-fb-www, .comp-fb-ebi { border-radius:8px; padding:10px 14px; margin:8px 0; font-size:.875rem; line-height:1.5; }
  .comp-fb-www { background:#ecfdf5; border-left:4px solid #22c55e; }
  .comp-fb-ebi { background:#fff7ed; border-left:4px solid #f59e0b; }
  .comp-fb-www ul, .comp-fb-ebi ul { margin:6px 0 0; padding-left:18px; }
  .comp-fb-www strong, .comp-fb-ebi strong { display:block; margin-bottom:2px; }
  [data-theme="dark"] .comp-fb-www { background:#052e1a; } [data-theme="dark"] .comp-fb-ebi { background:#3a2a10; }
  .comp-model-toggle { margin-top:8px; background:none; border:1px solid var(--border); border-radius:8px; padding:6px 12px; font-size:.8125rem; font-weight:600; color:var(--blue,#3b82f6); cursor:pointer; }
  .comp-model { margin-top:8px; white-space:pre-wrap; background:#eef2ff; border:1px solid #c7d2fe; border-radius:8px; padding:12px; font-size:.875rem; line-height:1.6; color:var(--text); }
  [data-theme="dark"] .comp-model { background:#1e1b4b; border-color:#3730a3; }
  .comp-fallback-note { background:#fff7ed; border:1px solid #fed7aa; border-radius:8px; padding:12px 14px; margin-bottom:16px; font-size:.875rem; color:#9a3412; }
  .comp-spinner { width:44px; height:44px; border:4px solid var(--ring-track,#e5e7eb); border-top-color:#f59e0b; border-radius:50%; animation:comp-spin .8s linear infinite; }
  @keyframes comp-spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<a class="skip-link" href="#comp-main">Skip to content</a>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header class="island-header" id="comp-header" style="background:var(--surface)">
  <a href="dashboard.html?subject=english" class="island-header-back" aria-label="Back to dashboard">&#8592;</a>
  <div class="island-header-info">
    <h2>Comprehension</h2>
    <div class="island-header-meta">
      <span class="subject-pill" style="font-size:.6875rem;padding:2px 8px;background:#f59e0b;color:white">English</span>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <button class="theme-toggle" onclick="openProfileModal()" aria-label="My Profile">&#x1F464;</button>
    <button class="theme-toggle" onclick="handleThemeToggle()" id="theme-btn" aria-label="Toggle colour theme">&#x1F319;</button>
  </div>
</header>

<!-- ── Main ────────────────────────────────────────────────────────────────── -->
<main class="page-main island-main" id="comp-main">

  <!-- Stats bar -->
  <div class="comp-stats-bar" role="status" aria-live="polite">
    <span class="comp-stats-label" id="stats-label">0 / 40 passages completed</span>
    <div class="comp-stats-bar-track" role="progressbar" aria-valuemin="0" aria-valuemax="40" aria-valuenow="0" id="stats-progress-bar">
      <div class="comp-stats-bar-fill" id="stats-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Filter bar -->
  <div class="comp-filter-row" role="group" aria-label="Filter passages by type">
    <button class="comp-filter-btn active" data-filter="all" onclick="setFilter('all')" aria-pressed="true">
      All <span class="comp-filter-count" id="count-all">40</span>
    </button>
    <button class="comp-filter-btn" data-filter="fiction" onclick="setFilter('fiction')" aria-pressed="false">
      Fiction <span class="comp-filter-count" id="count-fiction">20</span>
    </button>
    <button class="comp-filter-btn" data-filter="nonfiction" onclick="setFilter('nonfiction')" aria-pressed="false">
      Non-Fiction <span class="comp-filter-count" id="count-nonfiction">20</span>
    </button>
  </div>

  <!-- Passage cards grid -->
  <div class="passage-grid" id="passage-grid" role="list" aria-label="Reading passages"></div>

</main>

<!-- ── Expanded passage overlay ─────────────────────────────────────────────── -->
<div class="expanded-overlay" id="expanded-overlay" role="dialog" aria-modal="true" aria-label="Reading passage">
  <div class="expanded-header">
    <button class="expanded-close-btn" id="expanded-close-btn" onclick="closeExpanded()" aria-label="Close passage">&#8592; Close</button>
    <div class="expanded-title-area">
      <div class="expanded-title" id="expanded-title"></div>
      <div class="expanded-meta" id="expanded-meta"></div>
    </div>
  </div>
  <div class="expanded-body">
    <div class="expanded-passage-col" id="expanded-passage"></div>
    <div class="expanded-questions-col" id="expanded-questions"></div>
  </div>
</div>

<!-- ── Profile Modal ───────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="profile-modal" role="dialog" aria-modal="true" aria-labelledby="profile-modal-title" onclick="closeProfileModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="profile-modal-title">My Profile</h3>
      <button class="modal-close" onclick="closeProfileModal()" aria-label="Close profile modal">&#10005;</button>
    </div>
    <p style="margin:0 0 4px;font-size:.8125rem;color:var(--text-muted)">👤 Account: <span id="display-parent-name">—</span> · <span id="display-parent-email">—</span></p>
    <div class="divider" style="margin:8px 0 12px"></div>
    <div class="form-group">
      <label class="form-label" for="edit-name">Child's name</label>
      <input class="form-input" id="edit-name" type="text">
    </div>
    <div class="form-group">
      <label class="form-label" for="edit-year">Year group</label>
      <select class="form-input form-select" id="edit-year">
        <option value="Year 7">Year 7</option>
        <option value="Year 8" disabled>Year 8 — Coming Soon</option>
        <option value="Year 9" disabled>Year 9 — Coming Soon</option>
        <option value="Year 10" disabled>Year 10 — Coming Soon</option>
        <option value="Year 11" disabled>Year 11 — Coming Soon</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label" for="edit-school">School <span style="color:var(--text-muted);font-weight:400">(optional)</span></label>
      <input class="form-input" id="edit-school" type="text">
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-primary" style="flex:1" onclick="saveProfile()">Save changes</button>
    </div>
    <div class="divider"></div>
    <button class="btn btn-secondary" style="width:100%" onclick="logout()">Sign out</button>
  </div>
</div>

<!-- ── Mobile Bottom Nav ───────────────────────────────────────────────────── -->
<nav class="mobile-nav">
  <button class="mobile-nav-item" onclick="window.location.href='dashboard.html?subject=english'">
    <span class="mobile-nav-icon">&#x1F3E0;</span>
    Dashboard
  </button>
  <button class="mobile-nav-item" onclick="openProfileModal()">
    <span class="mobile-nav-icon">&#x1F464;</span>
    Profile
  </button>
  <button class="mobile-nav-item" id="mobile-streak-btn">
    <span class="mobile-nav-icon">&#x1F525;</span>
    <span id="mobile-streak-label">0 days</span>
  </button>
</nav>

<!-- ATLAS bootstrap — these tags load ALL content via core/manifest.js. Add a year = edit manifest only. -->
<script src="core/globals.js"></script>
<script src="core/config.js"></script>
<script src="core/manifest.js"></script>
<script src="core/loader.js"></script>
<script src="core/auth-shim.js"></script>
<script src="core/app.js"></script>
<script>
// ── Init ──────────────────────────────────────────────────────────────────────
var user = requireAuth();
// Year-aware passage set: Year 8 uses the longer, written/GCSE-style passages.
var isY8 = !!(user && user.year === 'Year 8');
var passages = (isY8 && typeof COMPREHENSION_PASSAGES_Y8 !== 'undefined' && COMPREHENSION_PASSAGES_Y8.length)
  ? COMPREHENSION_PASSAGES_Y8
  : (typeof COMPREHENSION_PASSAGES !== 'undefined' ? COMPREHENSION_PASSAGES : []);
var currentFilter = 'all';
var expandedPassageId = null;
var QUESTIONS_PER_TEST = 5;

// Current test state (for the active expanded passage)
var currentTestQuestions = [];   // array of {q, skill, opts, c, e, shuffled, correctIdx}
var currentSelections = {};      // { qIdx: chosenOptionIdx }
var testSubmitted = false;

// Written (GCSE) mode state
var writtenMode = false;
var currentWritten = [];          // array of {q, skill, marks, guidance, model}
var writtenSubmitted = false;
var writtenFeedback = null;

(function init() {
  initTheme();
  updateThemeBtn();
  touchStreak();
  updateFilterCounts();
  renderCards();
  updateStats();
  initMobileStreak();

  // Deep-link: auto-open a specific passage via ?id=F01
  var params = new URLSearchParams(location.search);
  var linkId = params.get('id');
  if (linkId && passages.find(function(p) { return p.id === linkId; })) {
    setTimeout(function() { openExpanded(linkId); }, 100);
  }
})();

// ── Theme ─────────────────────────────────────────────────────────────────────
function handleThemeToggle() { toggleTheme(); updateThemeBtn(); }
function updateThemeBtn() {
  var dark = document.documentElement.getAttribute('data-theme') === 'dark';
  var btn = document.getElementById('theme-btn');
  btn.textContent = dark ? '☀️' : '🌙';
  btn.setAttribute('aria-label', dark ? 'Switch to light mode' : 'Switch to dark mode');
  btn.setAttribute('aria-pressed', dark ? 'true' : 'false');
}

// ── Shuffle (Fisher-Yates) ────────────────────────────────────────────────────
function shuffleArray(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

// ── Progress helpers (score-based) ────────────────────────────────────────────
function getPassageProgress(passageId) {
  try {
    return JSON.parse(localStorage.getItem('sm_comp_' + passageId)) || null;
  } catch(e) {
    return null;
  }
}
function savePassageProgress(passageId, score, total) {
  localStorage.setItem('sm_comp_' + passageId, JSON.stringify({
    score: score,
    total: total,
    date: Date.now()
  }));
  // Persist to the server so comprehension progress survives across devices/years.
  if (typeof syncProgressToServer === 'function') syncProgressToServer();
}
function isPassageComplete(passage) {
  var progress = getPassageProgress(passage.id);
  return progress !== null;
}
function getScoreClass(score, total) {
  if (score === total) return 'perfect';
  if (score >= Math.ceil(total * 0.6)) return 'good';
  return 'needs-work';
}
function getScoreMessage(score, total) {
  if (score === total) return 'Perfect score!';
  if (score >= Math.ceil(total * 0.8)) return 'Great work!';
  if (score >= Math.ceil(total * 0.6)) return 'Good effort!';
  return 'Keep practising!';
}

// ── Filter counts ─────────────────────────────────────────────────────────────
function updateFilterCounts() {
  var allCount = passages.length;
  var fictionCount = passages.filter(function(p) { return p.type === 'fiction'; }).length;
  var nonfictionCount = passages.filter(function(p) { return p.type === 'nonfiction'; }).length;
  document.getElementById('count-all').textContent = allCount;
  document.getElementById('count-fiction').textContent = fictionCount;
  document.getElementById('count-nonfiction').textContent = nonfictionCount;
}

// ── Filter ────────────────────────────────────────────────────────────────────
function setFilter(filter) {
  currentFilter = filter;
  var buttons = document.querySelectorAll('.comp-filter-btn');
  buttons.forEach(function(btn) {
    var isActive = btn.getAttribute('data-filter') === filter;
    btn.classList.toggle('active', isActive);
    btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
  });
  renderCards();
}

// ── Stats bar ─────────────────────────────────────────────────────────────────
function updateStats() {
  var completed = 0;
  passages.forEach(function(p) {
    if (isPassageComplete(p)) completed++;
  });
  var total = passages.length;
  var pct = total > 0 ? Math.round((completed / total) * 100) : 0;
  document.getElementById('stats-label').textContent = completed + ' / ' + total + ' passages completed';
  document.getElementById('stats-fill').style.width = pct + '%';
  var bar = document.getElementById('stats-progress-bar');
  bar.setAttribute('aria-valuenow', completed);
  bar.setAttribute('aria-valuemax', total);
}

// ── Render passage cards ──────────────────────────────────────────────────────
function renderCards() {
  var grid = document.getElementById('passage-grid');
  var filtered = currentFilter === 'all' ? passages : passages.filter(function(p) {
    return p.type === currentFilter;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:40px;grid-column:1/-1">No passages found.</p>';
    return;
  }

  grid.innerHTML = filtered.map(function(p) {
    var progress = getPassageProgress(p.id);
    var typeBadgeClass = p.type === 'fiction' ? 'fiction' : 'nonfiction';
    var typeLabel = p.type === 'fiction' ? 'Fiction' : 'Non-Fiction';
    var written = isWrittenPassage(p);
    var qCount = Math.min(p.questions.length, QUESTIONS_PER_TEST);
    var qBadgeText = written
      ? (p.questions.reduce(function(s, q) { return s + (q.marks || 0); }, 0) + ' marks')
      : (qCount + ' question' + (qCount !== 1 ? 's' : ''));

    // Score badge
    var scoreBadgeHtml = '';
    var checkMark = '';
    if (progress) {
      var sc = getScoreClass(progress.score, progress.total);
      scoreBadgeHtml = '<span class="passage-score-badge ' + sc + '">Last: ' + progress.score + '/' + progress.total + '</span>';
      checkMark = '<span class="passage-complete-check" aria-label="Attempted" title="Last score: ' + progress.score + '/' + progress.total + '">&#10003;</span>';
    }

    return '<div class="passage-card" role="listitem" tabindex="0" data-id="' + p.id + '" onclick="openExpanded(\'' + p.id + '\')" onkeydown="cardKeyHandler(event, \'' + p.id + '\')">' +
      '<div class="passage-card-header">' +
        '<span class="passage-type-badge ' + typeBadgeClass + '">' + typeLabel + '</span>' +
        checkMark +
      '</div>' +
      '<div class="passage-card-title">' + escapeHtml(p.title) + '</div>' +
      '<div class="passage-card-source">' + escapeHtml(p.source) + '</div>' +
      '<div class="passage-card-footer">' +
        '<span class="passage-q-badge">' + qBadgeText + '</span>' +
        scoreBadgeHtml +
      '</div>' +
    '</div>';
  }).join('');
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function cardKeyHandler(e, passageId) {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    openExpanded(passageId);
  }
}

// ── Pick random questions for a test ──────────────────────────────────────────
function pickTestQuestions(passage) {
  var pool = passage.questions.slice();
  var picked = shuffleArray(pool).slice(0, QUESTIONS_PER_TEST);

  return picked.map(function(q) {
    var correctText = q.opts[q.c];
    var shuffled = shuffleArray(q.opts);
    var correctIdx = shuffled.indexOf(correctText);
    return {
      q: q.q,
      skill: q.skill,
      opts: q.opts,
      c: q.c,
      e: q.e,
      shuffled: shuffled,
      correctIdx: correctIdx
    };
  });
}

// ── Open expanded view (test mode) ───────────────────────────────────────────
function openExpanded(passageId) {
  var passage = passages.find(function(p) { return p.id === passageId; });
  if (!passage) return;
  expandedPassageId = passageId;
  writtenMode = isWrittenPassage(passage);

  // Title & meta
  document.getElementById('expanded-title').textContent = passage.title;
  document.getElementById('expanded-meta').textContent = passage.source;

  // Passage text
  var passageCol = document.getElementById('expanded-passage');
  var paragraphs = passage.text.split(/\n\n+/);
  passageCol.innerHTML = '<div class="passage-text">' +
    paragraphs.map(function(para) {
      return '<p>' + escapeHtml(para.trim()) + '</p>';
    }).join('') +
  '</div>';

  // Reset state and render the appropriate question mode
  if (writtenMode) {
    currentWritten = passage.questions.slice();
    writtenSubmitted = false;
    writtenFeedback = null;
    renderWrittenQuestions();
  } else {
    currentTestQuestions = pickTestQuestions(passage);
    currentSelections = {};
    testSubmitted = false;
    renderTestQuestions();
  }

  // Show overlay
  var overlay = document.getElementById('expanded-overlay');
  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';
  document.getElementById('expanded-close-btn').focus();
}

function renderTestQuestions() {
  var questionsCol = document.getElementById('expanded-questions');
  var html = '';

  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">' +
    '<span style="font-size:.9375rem;font-weight:700;color:var(--text)">Questions</span>' +
    '<span style="font-size:.8125rem;color:var(--text-muted)" id="selection-count">0 / ' + currentTestQuestions.length + ' answered</span>' +
  '</div>';

  currentTestQuestions.forEach(function(tq, qIdx) {
    var optionsHtml = tq.shuffled.map(function(opt, oIdx) {
      var letter = ['A','B','C','D'][oIdx];
      var selectedClass = currentSelections[qIdx] === oIdx ? ' selected' : '';
      return '<button class="comp-option-btn' + selectedClass + '" onclick="selectOption(' + qIdx + ', ' + oIdx + ')">' +
        '<strong>' + letter + '.</strong> ' + escapeHtml(opt) + '</button>';
    }).join('');

    html += '<div class="comp-question-block" id="qblock-' + qIdx + '">' +
      '<span class="comp-skill-badge">' + escapeHtml(tq.skill) + '</span>' +
      '<div class="comp-question-text">' + (qIdx + 1) + '. ' + escapeHtml(tq.q) + '</div>' +
      optionsHtml +
      '<div class="comp-explanation" id="exp-' + qIdx + '">' + escapeHtml(tq.e) + '</div>' +
    '</div>';
  });

  // Submit button
  var answeredCount = Object.keys(currentSelections).length;
  var allAnswered = answeredCount === currentTestQuestions.length;
  html += '<button class="comp-submit-btn" id="submit-btn" onclick="submitTest()"' +
    (allAnswered ? '' : ' disabled') + '>Submit Answers</button>';

  questionsCol.innerHTML = html;
}

// ── Select an option ─────────────────────────────────────────────────────────
function selectOption(qIdx, oIdx) {
  if (testSubmitted) return;

  // Toggle: if same option clicked again, deselect
  if (currentSelections[qIdx] === oIdx) {
    delete currentSelections[qIdx];
  } else {
    currentSelections[qIdx] = oIdx;
  }

  // Update button styles for this question
  var block = document.getElementById('qblock-' + qIdx);
  if (block) {
    var buttons = block.querySelectorAll('.comp-option-btn');
    buttons.forEach(function(btn, i) {
      btn.classList.toggle('selected', currentSelections[qIdx] === i);
    });
  }

  // Update selection counter and submit button
  var answeredCount = Object.keys(currentSelections).length;
  var total = currentTestQuestions.length;
  var countEl = document.getElementById('selection-count');
  if (countEl) countEl.textContent = answeredCount + ' / ' + total + ' answered';

  var submitBtn = document.getElementById('submit-btn');
  if (submitBtn) submitBtn.disabled = answeredCount < total;
}

// ── Submit test ──────────────────────────────────────────────────────────────
function submitTest() {
  if (testSubmitted) return;
  testSubmitted = true;

  // Grade answers
  var score = 0;
  var total = currentTestQuestions.length;
  var results = [];
  currentTestQuestions.forEach(function(tq, qIdx) {
    var chosen = currentSelections[qIdx];
    var isCorrect = chosen === tq.correctIdx;
    if (isCorrect) score++;
    results.push({ chosen: chosen, correct: tq.correctIdx, isCorrect: isCorrect });
  });

  // Save progress
  savePassageProgress(expandedPassageId, score, total);

  // Show score screen in the questions column
  showScoreScreen(score, total, results);
}

function showScoreScreen(score, total, results) {
  var questionsCol = document.getElementById('expanded-questions');
  var sc = getScoreClass(score, total);
  var msg = getScoreMessage(score, total);

  var html = '<div class="comp-score-screen">' +
    '<div class="comp-score-ring ' + sc + '">' +
      '<div><div class="comp-score-number">' + score + '</div>' +
      '<div class="comp-score-total">out of ' + total + '</div></div>' +
    '</div>' +
    '<div class="comp-score-label">' + msg + '</div>' +
    '<div class="comp-score-sublabel">' + score + ' correct answer' + (score !== 1 ? 's' : '') + '</div>' +
    '<div class="comp-score-actions">' +
      '<button class="comp-btn-review" onclick="showReview()">Review Answers</button>' +
      '<button class="comp-btn-retake" onclick="retakeTest()">Retake</button>' +
      '<button class="comp-btn-close" onclick="closeExpanded()">Done</button>' +
    '</div>' +
  '</div>';

  questionsCol.innerHTML = html;
}

// ── Review answers (show correct/wrong + explanations) ──────────────────────
function showReview() {
  var questionsCol = document.getElementById('expanded-questions');
  var html = '';

  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">' +
    '<span style="font-size:.9375rem;font-weight:700;color:var(--text)">Review</span>' +
    '<button class="expanded-close-btn" style="font-size:.8125rem;padding:5px 12px" onclick="showScoreScreenFromReview()">Back to Score</button>' +
  '</div>';

  currentTestQuestions.forEach(function(tq, qIdx) {
    var chosen = currentSelections[qIdx];
    var isCorrect = chosen === tq.correctIdx;

    var statusHtml = isCorrect
      ? '<span class="comp-question-status right">Correct</span>'
      : '<span class="comp-question-status incorrect">Incorrect</span>';

    var optionsHtml = tq.shuffled.map(function(opt, oIdx) {
      var letter = ['A','B','C','D'][oIdx];
      var classes = 'comp-option-btn locked answered';
      if (oIdx === tq.correctIdx) classes += ' correct';
      if (oIdx === chosen && !isCorrect) classes += ' wrong';
      return '<button class="' + classes + '" disabled>' +
        '<strong>' + letter + '.</strong> ' + escapeHtml(opt) + '</button>';
    }).join('');

    html += '<div class="comp-question-block" id="qblock-' + qIdx + '">' +
      '<span class="comp-skill-badge">' + escapeHtml(tq.skill) + '</span>' + statusHtml +
      '<div class="comp-question-text">' + (qIdx + 1) + '. ' + escapeHtml(tq.q) + '</div>' +
      optionsHtml +
      '<div class="comp-explanation show">' + escapeHtml(tq.e) + '</div>' +
    '</div>';
  });

  html += '<div class="comp-score-actions" style="margin-top:24px">' +
    '<button class="comp-btn-retake" onclick="retakeTest()">Retake</button>' +
    '<button class="comp-btn-close" onclick="closeExpanded()">Done</button>' +
  '</div>';

  questionsCol.innerHTML = html;
}

function showScoreScreenFromReview() {
  // Recompute score from current state
  var score = 0;
  var total = currentTestQuestions.length;
  var results = [];
  currentTestQuestions.forEach(function(tq, qIdx) {
    var chosen = currentSelections[qIdx];
    var isCorrect = chosen === tq.correctIdx;
    if (isCorrect) score++;
    results.push({ chosen: chosen, correct: tq.correctIdx, isCorrect: isCorrect });
  });
  showScoreScreen(score, total, results);
}

// ── Retake test ──────────────────────────────────────────────────────────────
function retakeTest() {
  var passage = passages.find(function(p) { return p.id === expandedPassageId; });
  if (!passage) return;

  // Pick fresh random questions
  currentTestQuestions = pickTestQuestions(passage);
  currentSelections = {};
  testSubmitted = false;

  // Scroll questions column back to top
  var questionsCol = document.getElementById('expanded-questions');
  questionsCol.scrollTop = 0;

  renderTestQuestions();
}

// ── Written (GCSE) comprehension mode ────────────────────────────────────────
function isWrittenPassage(p) {
  return !!(p && p.questions && p.questions.length &&
            p.questions[0].marks !== undefined && !p.questions[0].opts);
}

function renderWrittenQuestions() {
  var col = document.getElementById('expanded-questions');
  var totalMarks = currentWritten.reduce(function(s, q) { return s + (q.marks || 0); }, 0);
  var html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">' +
    '<span style="font-size:.9375rem;font-weight:700;color:var(--text)">Questions</span>' +
    '<span style="font-size:.8125rem;color:var(--text-muted)">' + totalMarks + ' marks total</span></div>' +
    '<p style="font-size:.8125rem;color:var(--text-muted);margin-bottom:16px">Answer in full sentences, as you would in a GCSE exam. Use evidence from the text. Submit when you are ready for marking.</p>';

  currentWritten.forEach(function(q, i) {
    var rows = q.marks >= 6 ? 8 : (q.marks >= 4 ? 5 : 3);
    html += '<div class="comp-question-block">' +
      '<span class="comp-marks-badge">' + q.marks + ' mark' + (q.marks !== 1 ? 's' : '') + '</span>' +
      '<span class="comp-skill-badge">' + escapeHtml(q.skill || 'Question') + '</span>' +
      '<div class="comp-question-text">' + (i + 1) + '. ' + escapeHtml(q.q) + '</div>' +
      '<textarea class="comp-written-area" id="wq-' + i + '" rows="' + rows + '" placeholder="Write your answer here..."></textarea>' +
    '</div>';
  });
  html += '<button class="comp-submit-btn" id="submit-btn" onclick="submitWritten()">Submit for Marking</button>' +
    '<button class="comp-model-toggle" style="width:100%;margin-top:10px" onclick="revealAllModels()">Show model answers &amp; mark scheme</button>';
  col.innerHTML = html;
}

function gatherWritten() {
  return currentWritten.map(function(q, i) {
    var el = document.getElementById('wq-' + i);
    return { q: q.q, marks: q.marks, guidance: q.guidance || '', response: el ? el.value.trim() : '' };
  });
}

function submitWritten() {
  if (writtenSubmitted) return;
  var items = gatherWritten();
  var answered = items.filter(function(it) { return it.response.length > 0; }).length;
  if (answered === 0) {
    if (typeof showToast === 'function') showToast('Write at least one answer before submitting.', 'error');
    else alert('Write at least one answer before submitting.');
    return;
  }
  var passage = passages.find(function(p) { return p.id === expandedPassageId; });
  var col = document.getElementById('expanded-questions');
  col.innerHTML = '<div style="text-align:center;padding:48px 20px">' +
    '<div class="comp-spinner" style="margin:0 auto 20px"></div>' +
    '<h3>Marking your answers…</h3>' +
    '<p style="color:var(--text-muted)">A GCSE examiner is reading your responses. This usually takes 5–10 seconds.</p></div>';

  fetchWithAuth('/.netlify/functions/evaluate-comprehension', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ passageTitle: passage.title, passageText: passage.text, items: items })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data && data.success && data.feedback && Array.isArray(data.feedback.results)) {
      writtenSubmitted = true;
      writtenFeedback = data.feedback;
      showWrittenResults(items, data.feedback);
    } else {
      showWrittenSelfMark(items, true);
    }
  })
  .catch(function() { showWrittenSelfMark(items, true); });
}

function showWrittenResults(items, feedback) {
  var col = document.getElementById('expanded-questions');
  var total = 0, max = 0;
  feedback.results.forEach(function(r) { total += r.marks; max += r.max; });
  if (max === 0) items.forEach(function(it) { max += it.marks; });
  savePassageProgress(expandedPassageId, total, max);
  updateStats(); renderCards();

  var pct = max > 0 ? Math.round(total / max * 100) : 0;
  var sc = pct >= 70 ? 'perfect' : (pct >= 50 ? 'good' : 'needs-work');
  var html = '<div class="comp-score-screen">' +
    '<div class="comp-score-ring ' + sc + '"><div>' +
      '<div class="comp-score-number">' + total + '</div>' +
      '<div class="comp-score-total">out of ' + max + '</div></div></div>' +
    '<div class="comp-score-label">' + pct + '%</div>' +
    '<div class="comp-score-sublabel">' + escapeHtml(feedback.overall || '') + '</div></div>';

  currentWritten.forEach(function(q, i) {
    var r = feedback.results[i] || { marks: 0, max: q.marks, www: [], ebi: [] };
    html += '<div class="comp-question-block">' +
      '<span class="comp-marks-badge">' + r.marks + ' / ' + r.max + '</span>' +
      '<span class="comp-skill-badge">' + escapeHtml(q.skill || '') + '</span>' +
      '<div class="comp-question-text">' + (i + 1) + '. ' + escapeHtml(q.q) + '</div>' +
      '<div class="comp-your-answer">' + escapeHtml(items[i].response || '(no answer given)') + '</div>' +
      (r.www && r.www.length ? '<div class="comp-fb-www"><strong>What went well</strong><ul>' + r.www.map(function(s) { return '<li>' + escapeHtml(s) + '</li>'; }).join('') + '</ul></div>' : '') +
      (r.ebi && r.ebi.length ? '<div class="comp-fb-ebi"><strong>Even better if</strong><ul>' + r.ebi.map(function(s) { return '<li>' + escapeHtml(s) + '</li>'; }).join('') + '</ul></div>' : '') +
      '<button class="comp-model-toggle" onclick="toggleModel(' + i + ')">Show model answer</button>' +
      '<div class="comp-model" id="model-' + i + '" style="display:none">' + escapeHtml(q.model || '') + '</div>' +
    '</div>';
  });
  html += '<div class="comp-score-actions" style="margin-top:20px">' +
    '<button class="comp-btn-retake" onclick="retakeWritten()">Try Again</button>' +
    '<button class="comp-btn-close" onclick="closeExpanded()">Done</button></div>';
  col.innerHTML = html;
  col.scrollTop = 0;
}

// Self-mark fallback: shown if AI marking is unavailable, or when the student
// chooses to reveal model answers before submitting. No numeric score is saved.
function showWrittenSelfMark(items, aiFailed) {
  var col = document.getElementById('expanded-questions');
  var html = '<div class="comp-fallback-note">' + (aiFailed
      ? 'Automatic marking is unavailable right now. Compare your answers with the model answers and mark scheme below and mark yourself.'
      : 'Model answers and mark schemes are shown below. Use them to check your own answers, then submit for marking.') +
    '</div>';
  currentWritten.forEach(function(q, i) {
    html += '<div class="comp-question-block">' +
      '<span class="comp-marks-badge">' + q.marks + ' mark' + (q.marks !== 1 ? 's' : '') + '</span>' +
      '<span class="comp-skill-badge">' + escapeHtml(q.skill || '') + '</span>' +
      '<div class="comp-question-text">' + (i + 1) + '. ' + escapeHtml(q.q) + '</div>' +
      (items[i] && items[i].response ? '<div class="comp-your-answer">' + escapeHtml(items[i].response) + '</div>' : '') +
      '<div class="comp-fb-ebi"><strong>Mark scheme</strong><div>' + escapeHtml(q.guidance || '') + '</div></div>' +
      '<button class="comp-model-toggle" onclick="toggleModel(' + i + ')">Show model answer</button>' +
      '<div class="comp-model" id="model-' + i + '" style="display:none">' + escapeHtml(q.model || '') + '</div>' +
    '</div>';
  });
  html += '<div class="comp-score-actions" style="margin-top:20px">' +
    '<button class="comp-btn-retake" onclick="retakeWritten()">Back to Questions</button>' +
    '<button class="comp-btn-close" onclick="closeExpanded()">Done</button></div>';
  col.innerHTML = html;
  col.scrollTop = 0;
}

function revealAllModels() {
  showWrittenSelfMark(gatherWritten(), false);
}

function toggleModel(i) {
  var el = document.getElementById('model-' + i);
  if (!el) return;
  var show = el.style.display === 'none';
  el.style.display = show ? '' : 'none';
  var btn = el.previousElementSibling;
  if (btn && btn.classList.contains('comp-model-toggle')) btn.textContent = show ? 'Hide model answer' : 'Show model answer';
}

function retakeWritten() {
  var passage = passages.find(function(p) { return p.id === expandedPassageId; });
  if (!passage) return;
  currentWritten = passage.questions.slice();
  writtenSubmitted = false;
  writtenFeedback = null;
  document.getElementById('expanded-questions').scrollTop = 0;
  renderWrittenQuestions();
}

// ── Close expanded ───────────────────────────────────────────────────────────
function closeExpanded() {
  var overlay = document.getElementById('expanded-overlay');
  overlay.classList.remove('show');
  document.body.style.overflow = '';
  expandedPassageId = null;
  currentTestQuestions = [];
  currentSelections = {};
  testSubmitted = false;

  // Refresh cards and stats
  renderCards();
  updateStats();

  // Return focus to the card that was clicked
  var cards = document.querySelectorAll('.passage-card');
  if (cards.length > 0) cards[0].focus();
}

// ── Keyboard navigation ───────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    var overlay = document.getElementById('expanded-overlay');
    if (overlay.classList.contains('show')) {
      closeExpanded();
      return;
    }
    var modal = document.getElementById('profile-modal');
    if (modal.classList.contains('show')) {
      closeProfileModal();
      return;
    }
    window.location.href = 'dashboard.html?subject=english';
  }
});

// ── Profile Modal Logic ───────────────────────────────────────────────────────
var _modalTrigger = null;
function openProfileModal() {
  _modalTrigger = document.activeElement;
  var u = JSON.parse(localStorage.getItem('sm_active_profile') || '{}');
  var identity = getIdentityUser();
  document.getElementById('display-parent-name').textContent = u.parentName || (identity && identity.user_metadata ? identity.user_metadata.full_name : '') || '—';
  document.getElementById('display-parent-email').textContent = identity ? identity.email : '—';
  document.getElementById('edit-name').value = u.name || '';
  document.getElementById('edit-year').value = u.year || 'Year 7';
  document.getElementById('edit-school').value = u.school || '';
  document.getElementById('profile-modal').classList.add('show');
  setTimeout(function() { document.getElementById('edit-name').focus(); }, 50);
}
function closeProfileModal(e) {
  if (e && e.target !== document.getElementById('profile-modal')) return;
  document.getElementById('profile-modal').classList.remove('show');
  if (_modalTrigger) { _modalTrigger.focus(); _modalTrigger = null; }
}
document.getElementById('profile-modal').addEventListener('keydown', function(e) {
  if (!this.classList.contains('show')) return;
  if (e.key !== 'Tab') return;
  var focusable = this.querySelector('.modal').querySelectorAll(
    'button:not([disabled]), input, select, [tabindex]:not([tabindex="-1"])'
  );
  var first = focusable[0];
  var last = focusable[focusable.length - 1];
  if (e.shiftKey) {
    if (document.activeElement === first) { e.preventDefault(); last.focus(); }
  } else {
    if (document.activeElement === last) { e.preventDefault(); first.focus(); }
  }
});
function saveProfile() {
  var name = document.getElementById('edit-name').value.trim();
  var year = document.getElementById('edit-year').value;
  var school = document.getElementById('edit-school').value.trim();
  if (!name) return;
  var u = JSON.parse(localStorage.getItem('sm_active_profile') || '{}');
  u.name = name; u.year = year; u.school = school;
  localStorage.setItem('sm_active_profile', JSON.stringify(u));
  syncProgressToServer();
  document.getElementById('profile-modal').classList.remove('show');
  showToast('Profile updated', 'success');
}
function logout() {
  localStorage.removeItem('gotrue.user');
  localStorage.removeItem('sm_active_profile');
  if (typeof netlifyIdentity !== 'undefined') {
    try { netlifyIdentity.logout(); } catch (e) { /* token already cleared */ }
  }
  window.location.href = 'index.html';
}

// ── Mobile streak display ─────────────────────────────────────────────────────
function initMobileStreak() {
  var streak = parseInt(localStorage.getItem('sm_streak') || '0');
  var el = document.getElementById('mobile-streak-label');
  if (el) el.textContent = streak + ' day' + (streak !== 1 ? 's' : '');
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, type) {
  var t = document.createElement('div');
  t.className = 'toast toast--' + (type || 'info');
  t.setAttribute('role', 'status');
  t.setAttribute('aria-live', 'polite');
  t.setAttribute('aria-atomic', 'true');
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(function() { t.classList.add('toast--show'); });
  setTimeout(function() { t.classList.remove('toast--show'); setTimeout(function() { t.remove(); }, 300); }, 2500);
}
</script>
