# Netlify config — static site (no build step), with serverless functions.
[build]
  publish = "."
  functions = "netlify/functions"

[dev]
  publish = "."
  functions = "netlify/functions"
  port = 8899

# esbuild bundles the ESM functions (.mjs) and their npm deps (@netlify/blobs,
# @anthropic-ai/sdk) plus the shared netlify/lib/auth.mjs. Required — without it
# the function build fails.
[functions]
  node_bundler = "esbuild"

# SPA-style pages are plain .html, so no redirects needed.
# ANTHROPIC_API_KEY is set in the Netlify UI, not here.
